name: audit

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1'

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
